kind = "web"
previewPath = "/"
title = "Famajo Corretora"
version = "1.0.0"
id = "artifacts/famajo-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19134

[services.development]
run = "pnpm --filter @workspace/famajo-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/famajo-site", "run", "build" ]
publicDir = "artifacts/famajo-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19134"
BASE_PATH = "/"
